name: Docker Build Check

on:
  push:
    branches:
      - "feature/**"

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        # uses: docker/build-push-action@v6
        run: |
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          docker build -t discord_bot:${BRANCH} .
